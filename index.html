<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SistemasDeInfo2DoParcial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }

    h1 {
      font-size: 28px;
      color: #89b4fa;
      text-align: center;
    }

    p {
      color: #a6adc8;
      font-size: 15px;
      text-align: center;
    }

    .cards {
      display: flex;
      gap: 32px;
    }

    .card {
      background: #313244;
      border: 2px solid #45475a;
      border-radius: 16px;
      padding: 36px 40px;
      width: 280px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.3s, transform 0.2s;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: #89b4fa;
      transform: translateY(-4px);
    }

    .card .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .card h2 {
      font-size: 18px;
      color: #cdd6f4;
      margin-bottom: 10px;
    }

    .card p {
      font-size: 13px;
      color: #a6adc8;
    }

    .badge {
      display: inline-block;
      margin-top: 16px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: bold;
      background: #1F4E79;
      color: #89b4fa;
    }
  </style>
</head>
<body>

  <div>
    <h1>🎓 SistemasDeInfo — 2do Parcial</h1>
    <p>Selecciona el proyecto que deseas ejecutar</p>
  </div>

  <div class="cards">
    <a class="card" href="/editor">
      <div class="icon">🖊️</div>
      <h2>Editor Colaborativo</h2>
      <p>Editor en tiempo real para dos desarrolladores usando Socket.IO</p>
      <span class="badge">HU-TrabajoColab</span>
    </a>

    <a class="card" href="/apoyo">
      <div class="icon">🆘</div>
      <h2>Sistema de Apoyo</h2>
      <p>Gestión de tareas que requieren apoyo entre colaboradores</p>
      <span class="badge">HU-01</span>
    </a>
  </div>

</body>
</html>
